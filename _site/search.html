      "2025-12-31-eoy-2025-html": {
        "title": "我又在干嘛&amp;thinsp;?",
        "tags": "end-of-year",
        "date": "December 31, 2025",
        "author": "",
        "category": "",
        "content": "上周结束了今年的最后一次美东行程，赶在圣诞前夕回到加州。航班落地后，一向风和日丽的圣巴巴拉居然罕见地连降暴雨，离家一街之隔的主路边一度竟有深过小腿的积水。意外的天气让节日的主题活动突然变得简单——在家门窗紧闭，静待雨过天晴。  C’est pourquoi quand je me suis mis à considérer les diverses agitations des hommes, les périls et les peines où ils s’exposent à la Cour, à la guerre, dans la poursuite de leurs prétentions ambitieuses, d’où naissent tant de querelles, de passions, et d’entreprises périlleuses et funestes ; j’ai souvent dit, que tout le malheur des hommes vient de ne savoir pas se tenir en repos dans une chambre.&nbsp; [Pascal,&nbsp;1670]     Transl.&nbsp; Therefore when I set upon the consideration of the sundry Agitations of Men, the Pains and Perils they expose themselves unto at Court, at the Wars, in the pursuit of their Ambitious Pretensions, from whence arise so many Quarrels, Passions, and wicked and dangerous Enterprises, I have often said, that all the Misfortune of Men proceeds from their not knowing how to keep themselves quiet in their Chamber.&nbsp; [Pascal,&nbsp;1688] 居家独处的年终给人以难得的时间与心境梳理飘零的思绪——2025 年是我回归学术界以及移居南加州的第一个整年，工作与生活处于一种变动之后的短暂平稳期：新实验室还在繁冗的迁移与重启流程中，科研节奏不得不较理想中有所放慢，却使我得以拾获一些从前没有的研究兴趣与思路；对暂时称之为家的美国西海岸仍不算有归属感，但也在慢慢适应这里独特的人文环境，并努力发掘其中吸引自己的有趣元素。相比之下，我觉得自己在这一年中思考过的问题要比经历的事情更值得回顾。于是想趁记忆消散前记下几个不成熟的想法，且作过去一年的非正式总结，也当是人生新阶段的自我勉励。 1 +杨振宁先生生前常在回首自己学习与研究经历的讲座中提到一件往事：在芝加哥大学取得博士学位的次年，杨先生曾花费不少时间钻研报纸上的有奖填字游戏，到普林斯顿高等研究院做博士后之初仍一度执着于此，有时为了破解字谜不惜在图书馆通宵达旦。一日清晨回到出租屋，杨先生在当天房东太太订阅的「纽约时报」头版中看到了湯川秀樹获得 1949 年诺贝尔物理学奖的新闻，一瞬间突然清醒——  我看了以后——我记得很清楚——我问我自己：「杨振宁，你现在在干嘛？」 从前听杨先生讲这个故事，我只当是大师年轻时的一段励志趣闻，未曾想到有一天它会与我自己的世界发生奇妙的联系——刚刚过去的十月初，2025 年诺贝尔物理学奖被授予三位共同发明超导人造原子的量子物理学家，其中有与我相识超过十年的博士导师，也是我现在的博士后指导教授。今年物理奖的获奖工作完成并发表于四十年前；巧合的是，导师比我年长整四十岁，当年他正是与我如今同龄的一名博士后研究员。而我呢？现在我又在干嘛？诺奖发布后的那段时间里，我经常在安静独处时「听到」脑海中的一个声音，以至于有几晚夜不能寐。我并非单纯质问自己何时才能做出水准相近的研究工作；与此相比，我更关心自己眼下是否找到了正确的努力方向——我手头几个自以为构思巧妙的课题真有足够重要的科学意义吗？我当前的学术方向具备长久的知识价值吗？我理想中的科学事业能为现实世界带来有益的改变吗？我重新选择的生涯轨迹有更加接近自己的人生理想吗？今年是我在大学读书和工作的累计第十二年。从中国到美国，从东海岸到西海岸，在我的经历与见闻中，高等教育可以给学生传授基本的文化素质与职业技能，能为少数人提供探索前沿知识的环境条件；但是制度化的教育本身并不能为我们简单指明未来的最佳发展路径，更无法代替独立个体寻找生命的动机与意义。同理，标准化的科研训练可能教会我们解决专业领域中的常规问题，但不会直接赋予我们做出重要工作必需的方向感与创造力，亦很少引导研究者批判审视领域自身的目标与局限。我同时渐渐发觉自己身边其实只有少数学者有对研究问题的选取给予足够严肃的关注；包括过去我自己在内的许多人都经常有意或无意地忽视一个事实——学术方向的选择很可能决定我们科学生涯的基准与上限。  Now what should I do? That stark question has plagued me many times in my research and teaching career. Every scientist and every scholar faces this vexing issue of what to work on each day. Most respond by working today to extend a little of yesterday’s line of thought or line of measurement or plot development. Most of us spend little time thinking seriously about choosing the research areas we next pursue. You hear few lectures on “how to choose a research direction.” Yet the choice of problems is the primary determinant of what one accomplishes in science.&nbsp; [Hopfield,&nbsp;2025] 博士毕业后，尽管对基础研究兴趣未减，我最终决定先在工业界体验片刻，转眼即度过了收获颇丰的近两年时光；返回学术界以来，我的科研兴趣与工作方式较之前都发生了不小的转变。在不同环境中的反差经历加深了我的一种体会：很多时候，制约我们探寻新方向的现实阻力可能正来自学术训练本身——特别是那些学科内部构建于人造叙事之上的思维规训。因此，理性评判研究领域的价值前景需要我们同时持有两种互补的视角：既具备专业水准的信息来源与知识储备，又能在必要时将自己从熟悉的专业语境中暂时抽脱，尽可能客观地看清学科或行业的真实现状，诚实回答「我正在干嘛」和「我究竟想干嘛」——不可以轻率，更不可以撒谎。 2 +大一春季学期，我在新生研讨课上第一次接触到了量子信息、量子计算与超导量子电路的概念；十多年过去，量子物理与量子信息技术依然是我当前科研的大主题。这门学科有两点令我持续着迷的核心特质：一是理论概念上物质与信息基本规律的连接，二是实验系统中科学与工程方法的交融。量子信息科学满足了我对知识深度与广度的心智需求，也为不同风格的学者提供了从基础到应用的广阔探索空间，有时甚至会给人传递一种推动科学框架创新和技术革命的特殊使命感——  Historically, much of fundamental physics has been concerned with discovering the fundamental particles of nature and the equations which describe their motions and interactions. It now appears that a different programme may be equally important: to discover the ways that nature allows, and prevents, information to be expressed and manipulated, rather than particles to move. [...] The programme to re-investigate the fundamental principles of physics from the standpoint of information theory is still in its infancy. However, it already appears to be highly fruitful, and it is this ambitious programme that I aim to summarize.&nbsp; [Steane,&nbsp;1998]   One usually associates quantum mechanics with microscopic particles such as electrons, atoms or photons and classical mechanics with macroscopic objects [...] In recent years however,the notion has emerged that some systems, referred to as macroscopic quantum systems, have a status intermediate between microscopic particles and classical macroscopic objects. [...] The parameters influencing this quantum behavior are not fundamental, \"God-given\" constants [...] They are phenomenological parameters which can be tailored by the design of the system. Macroscopic quantum mechanics is a new area of research where novel quantum phenomena that have no equivalent in the microscopic world can be imagined and observed.&nbsp; [Devoret,&nbsp;1997] 上世纪八九十年代至今，量子信息与量子计算的研究进展极大加深了人们对量子物理基本规律的认知，也催生了一系列针对人造量子系统的全新实验手段。然而我认为客观地说：在当下的时间节点，量子信息学正处于创立以来的一个主要瓶颈期，它目前的诸多困难中有两朵最为显著的「乌云」——\t1.&nbsp; 尽管不断涌现出可喜的技术进步，大型实用量子计算机的目标依旧非常遥远；甚至可以说在系统工程的视角下，所有现存的原理验证实验都只有很小概率可能成为规模化量子计算系统的最终路线方案。\t2.&nbsp; 量子算法的新近发展明显不及物理硬件，以至于人们至今仍未能从理论上明确提出量子计算机超出基础研究范围的具体实用场景，也因而难以对这一领域长期高额投入的经济合理性给出令人信服的论证。机遇与挑战并存是科学研究的客观规律，晴朗天空中的「乌云」本身不应该成为令人沮丧的理由——如果整个科研生态系统可以找到化解危机的正确方式。然而在时下量子计算的学界与业界，相当一部分研究机构和公司却都选择用过度乐观甚至「放卫星」式的营销宣传推高领域热度，再通过专业内外的信息差与科技圈的资本运作实现获利。许多对量子技术的长远未来抱有信心的研究者也不得不将自己眼前的职业生涯与此轮正逐渐透支公众期望与信誉的科技泡沫绑定，期待热点带来的短期资源能够助力领域的下一步突破，仿佛当今时代的科技创新都必须遵从那句气质前卫但实则历史悠久的「名言」——“Fake it till you make it.”  You have nothing to do but mention the quantum theory, andpeople will take your voice for the voice of Science, and believe anything.&nbsp; [Shaw,&nbsp;1939]   Hyping your product to get funding while concealing your true progress and hoping that reality will eventually catch up to the hype continues to be tolerated in the tech industry. [...] If there was collateral damage on her way to riches and fame, so be it.&nbsp; [Carreyrou,&nbsp;2018] 这条路径在我看来是十分危险的。但与最常见的观点不同，我认为科技泡沫的危害不仅在于泡沫破裂后领域外界支持的崩塌及其连带的社会经济损耗——热潮背后的功利主义与投机心态往往在泡沫的形成阶段就已经开始危害研究领域的健康。比如，短线成果的竞争压力时常屏蔽从业者对学科长期发展需求的思考；各种人造概念或商业目标干扰着人们对领域内真正问题的判断；大量缺乏新意或质量平庸的工作挤占了原创研究需要的资源与空间；更重要的是，严肃科学的客观理性精神在此过程中被不断稀释，令人不由得怀疑量子信息技术的宏伟蓝图背后是否只是学术界联合资本圈发起的又一场创业游戏。 3 +再次回到大学实验室，我正在有意识地将自己的工作重心逐渐移离量子计算。如此决定并非因为我对量子技术的前景失去信心——恰恰相反，我倾向于认为量子物理对人类知识与社会的潜在影响还远未被充分发掘，但解锁这些潜力需要的不是更大规模的营销运作，而是扎实的底层原理创新；同时，除了远大的革命式愿景，科学研究也需要有意义明确的阶段性动机和灵活独立的具体目标任务。  We did make choices on the way. Our route turned out to connect with several scientific/technological hypes. [...] Quantum information is also a subject of high recent attention in the press and in politics. The outcome will determine whether in this round it is a hype or an important breakthrough. [...] I think that scientists should have a good medium-term plan of their own that they keep in mind when they apply for short-term support. They should also have a good instinct about where they want to go in the long run. At all times they should be honest to themselves and to others about what they expect.&nbsp; [Mooij,&nbsp;2022]我现在的工作单位是一个名称前不加任何修饰的物理系；日常思考的问题也不再是量子比特的优化或量子芯片的控制，而是类如怎样用微波超导电路实现微纳尺度的磁场测量、如何对新型低维超导体进行微波光谱观测、如何借用核磁共振原理研究量子霍尔效应等风格更加传统的实验物理课题。它们与超导量子计算实验有着共同的方法基础——通过超导量子电路实现对微弱物理信号或信息的检测与放大；因此我的新研究方向可以被理解为量子信息技术在凝聚态物理实验中的延伸。选择偏向基础物理的博士后课题，我的初衷之一是重获「一张平静的书桌」——希望能在愈发躁动的学术圈中寻找几分科学本身的简单纯净。这未尝不是一种天真的想法，却也是支撑我继续科研生涯的一项重要信念。无论如何定义历史起点，凝聚态物理都是一门相较量子信息学有更多积淀的学科；它的早期发展与材料和电子工业有密切联系，曾衍生出包括半导体晶体管和集成电路在内的不少重大技术发明。但自上世纪末以来，凝聚态物理的前沿逐渐演变为以超导、拓扑、关联等现象与概念为主线，探究天然或人造物质体系新奇存在状态的「纯粹」科学；虽不算抽象程度最高的物理学分支，但其关注的多数核心问题与工业应用已无直接关联，科研的动机主要来自学术共同体自身的好奇心与创造力。这种演化历程颇似进入基本粒子时代的高能物理或是序列主义诞生后的现代音乐——许多起源于经验实践的智力活动在越过一定发展阈值后都会从直观世界逐步抽离，进而呈现出一种由内部思维规则主导的高度专业化状态。  [...] the structure of physical law can no longer be assumed to correspond in any way with our direct perception of the world. The philosophical phrase is ‘emergence at every level’; the properties of space, time and matter which derive from common sense are not the ‘true’ properties of the underlying theoretical structures as we have come to understand them. This has left physics increasingly estranged from the common wisdom, an estrangement which may have disastrous consequences for both scientists and the lay public.&nbsp; [Anderson,&nbsp;1995]  The unprecedented divergence between contemporary serious music and its listeners, on the one hand, and traditional music and its following, on the other, is not accidental and—most probably—not transitory. Rather, it is a result of a half-century of revolution in musical thought, a revolution whose nature and consequences can be compared only with, and in many respects are closely analogous to, those of the mid-nineteenth-century revolution in theoretical physics. The immediate and profound effect has been the necessity for the informed musician to reexamine and probe the very foundations of his art. [...] He lives no longer in a unitary musical universe of “common practice,” but in a variety of universes of diverse practice.&nbsp; [Babbitt,&nbsp;2003]本科期间，我曾在寻找科研兴趣方向时短暂接触过凝聚态物理；那时我的学术想法还十分稚嫩，对现代物理以及实验科学思维观念的认知都很肤浅，读博之后也本能地偏向了知识交叉性更强、发展空间更宽的量子信息学。如今与凝聚态物理再次相遇，我却对这个自己并不陌生的学科产生了一些从前没有的复杂感受——我很期待自己接下来几年内能在它与超导量子技术的交汇点做出有质量的原创工作；可从长远考虑，这类主要由学科内部自我驱动与评判的「纯基础」研究真是我想在日后的独立学术生涯中主攻的方向吗？这个困惑的解答关系到另一个我正在重新思考的问题：究竟何为基础科学？ 4 +通常来说，人们对基础科学与应用科学的核心区分依据是它们实用价值的强弱——那些研究自然基本规律或逻辑工具方法的科学分支，如果暂时不能与应用问题产生具体联系，就一般会被贴上「基础」的标签。这种以「无用」为特征的分类标准实则是一种对概念的否定式定义 (definition by negation)——它并未从正面解释基础科学的本质到底是什么；并且这种定义本身也与事实存在明显的出入。一个最突出的问题是：很多基础科学在现实中并非是无用的——这些研究虽然自身不由实际问题驱动，却会为应用学科提供知识与方法支持，从而间接成为重要实用课题得以解决的关键。这种形式上类似分子生物学中心法则的科学价值传递转化规律如今已得到多数先进国家的广泛认同，并作为调用公共资源支持基础研究的理论依据——  Basic research is performed without thought of practical ends. It results in general knowledge and an understanding of nature and its laws. This general knowledge provides the means of answering a large number of important practical problems, though it may not give a complete specific answer to any one of them. The function of applied research is to provide such complete answers. The scientist doing basic research may not be at all interested in the practical applications of his work, yet the further progress of industrial development would eventually stagnate if basic scientific research were long neglected. [...] The simplest and most eﬀective way in which the Government can strengthen industrial research is to support basic research and to develop scientific talent.&nbsp; [Bush,&nbsp;1945] 可是，如果某些基础研究方向在可预见的将来都几乎不能产生任何类似「转录—翻译」的知识转移，它们还值得投入与资助吗？历史上，首先触发这一难题的学科是上世纪中后期的基本粒子物理——关于公共机构是否应该继续支持成本巨大却转化价值甚微的高能物理实验的争辩一度引发了西方知识界对于基础科学范畴的重新探讨。其中一种观点认为：基础研究的「基础性」并不在于学术问题本身的艰深抽象，更非有些人主张的所谓「无用为大用」，而是来自它们在整个现代科学体系中的基石或中枢地位——一个研究领域通过自身进展为其它学科提供的交叉支持越多，它在知识网络中的相对重要性就越高，也越有资格被称作基础科学；与此相反，某些与周边学科联系甚少的「纯粹」学术领域纵然无用，却并不符合基础科学的真正定义。  [...] the answer to the question: Does this broad field of research have scientific merit? cannot be answered within the field. [...] The word ‘fundamental’ in basic science, which is often used as a synonym for ‘important’, can be partly paraphrased into ‘relevance to neighbouring areas of science’. I would therefore sharpen the criterion of scientific merit by proposing that, other things being equal, that field has the most scientific merit which contributes most heavily to and illuminates most brightly its neighbouring scientific disciplines.&nbsp; [Weinberg,&nbsp;1963] 在重新考虑自己科研兴趣方向的时间里，上述基于学科之间的相互作用、带有明显的知识社会学 (sociology of knowledge) 思维特征的科学价值评判理论对我产生了很大启发——如今我会对那些追求「纯粹目标」并有自洽与自封闭倾向的研究方向保持警惕，因为我认为任何蓬勃向上的学术领域都必须处于交汇开放的思维环境中，而构建连通枢纽与拓展学科边界才是长久维持基础科学健康生命力的关键。在我心目中，最深刻的科学不仅是复杂精巧的思维游戏，更是真实世界中自然与人相互关系的严肃审视。关于量子科技的长期发展，我认为真正有待回答的问题是：在眼下的潮流热点之外，量子物理还有可能从哪些当代研究者尚未触及的角度影响人们对客观世界的认知或是对自身命运的关切？这个问题显然没有标准答案。近些年，一部分有远见的学者对量子技术在信息处理之外其它应用场景的探索在我看来就是很有意义的尝试——例如借助量子测量原理设计的新一代天体物理、粒子物理或凝聚态物理实验，后者也正是我博士后课题的切入点。不过我认为仅凭对基础物理研究的反馈并不足以支撑起一个新兴科技领域的蓬勃未来——科学家还有必要在更多未知前沿开展更具想象力的试探。比如，一个令我愈发着迷的话题是量子物理与生命世界的联系。尽管现代分子生物学与神经科学部分揭示了构建生命与意识的微观理化机制，人们至今仍未发现量子力学规律直接参与重要生化反应或生理活动的确信证据——表面上看，观察量子现象需要的特殊实验条件与常见生命系统依赖的开放环境之间存在天然的矛盾，可这个问题却与今天人们试图构造复杂人造量子机器面临的诸多挑战有着密切关联。量子生物学未来有望成为像量子信息学一样的综合交叉学科吗？从另一个角度思考，以核磁共振为代表的量子成像技术早已成为生物医学领域的标准实验工具，那么更先进的量子测量方法能被用来揭示生命与认知活动更精细的奥秘吗？反过来，这些新发现有可能帮助我们破解包括量子测量在内的量子力学基本问题吗？ 5 +通过量子科技手段透视物质与生命的边界大概是此刻我脑海中最大胆的科研梦想。有人认为人类创造所有的科学理论本质上都是对外部世界的主观诠释，而科学进步的终极目标则是理解与服务人性 (humanity) 本身。这个命题的前半部分与量子理论过去一百年间的进化轨迹高度契合，令人不禁好奇：我们是否有希望在下一个时代看到量子科学对人类个体与社会的更多实际回馈？现代科学史上，物理学与生物学的碰撞常会产生出乎意料的美妙结果——例如 X 射线晶体学曾为科学家揭示了包括 DNA 双螺旋在内无数支配生命活动的基本生化结构；另一个时间线更近的例子是通过物理模型解释生物神经系统中记忆与智能起源的尝试——它最终成为人工神经网络与机器学习的理论基石。这些发现与发明背后有一种共通的思维方式——将物理作为研究方法而非研究对象，并由此出发寻找不同科学分支之间的深层次连结。  In physical systems made from a large number of simple elements, interactions among large numbers of elementary components yield collective phenomena such as the stable magnetic orientations and domains in a magnetic system or the vortex patterns in fluid flow. Do analogous collective phenomena in a system of simple interacting neurons have useful “computational” correlates?&nbsp; [Hopfield,&nbsp;1982]   My answer to “Now What” is “here is a research problem which is unusual, perhaps significant, novel, that I can pose and probably solve because of my background in physics”. The situation would not be readily identified as a problem at all by those whose background seems much more relevant than my own. [...] I have generally had a relatively short attention span in science problems [...] Thus I have always been on the lookout for more interesting questions either as my present ones get worked out, or as they get classified by me as intractable, given my particular talents.&nbsp; [Hopfield,&nbsp;2018] 过去十年间，对科技界影响最大的时代潮流无疑是人工智能的进化与普及。时至今日，我们已经越来越少在主流意见中听到对 AI 作为一种通用生产力工具本身的质疑，取而代之的是各种关于这件革命性工具将怎样改变当代经济结构、劳动关系、社会秩序乃至人类生存状态的预言判断，以及世界应当如何应接这些趋势的思路对策。与此同时，AI 也在快速融入时下科学研究的诸多前沿，以至于对某些领域长期形成的思维范式发起了直接挑战。目前科学界就 AI 工具成规模参与知识生产的前景与后果仍存在非常不同的看法，但是有一点可以肯定——变革既至，我们已然无法回到过去。相比于传统方法，AI 在面对大数据、复杂系统和一部分抽象推理任务时经常表现出明显的效果优势。然而在我看来，AI 对现代科学体系最深刻的冲击在于二者方法论或认识论层面的根本分歧——理想的机器学习模型经过训练能够稳定输出高质量的结果，却不必要获取输入与输出之间的精确逻辑联系，这与基于经验归纳和逻辑演绎认知客观规律的传统科学思维有着显著区别；换言之，AI 工具在告诉我们答案可能「是什么」的同时却不会带来通常科学理论意义上的「为什么」，也有人将其直白总结为让研究者「产出更多却理解更少」。这并不是科学方法论自近代以来遭遇的第一次危机——十九世纪末到二十世纪初，统计物理和量子力学将随机性写进了自然基本法则，由此引发的关于决定论、因果律、实在性等话题的科学与哲学争议至今仍未完全消散。近些年来 AI 辅助科研的兴起则是对经典科学框架的进一步动摇——这一次，受到威胁的甚至包括科学的逻辑性、精确性、可预测性与可理解性本身。在人们的愿景中，AI 可以凭借机器算力优势扩展人类的智力机能，从而为科学探索提供推助与启发；可当研究者逐渐对一套自己不能充分掌控的人造系统产生认知依赖，人与机器究竟谁才是科学研究的主体？我们还可以像以往对待严肃科学那样信任由人机智能嵌合体制造的「新知识」吗？  We have seen how classical physics struggled in vain to reconcile growing quantitative observations with preconceived ideas on causality, derived from everyday experience but raised to the level of metaphysical postulates, and how it fought a losing battle against the intrusion of chance. To-day the order of ideas has been reversed: chance has become the primary notion, mechanics an expression of its quantitative laws, and the overwhelming evidence of causality with all its attributes in the realm of ordinary experience is satisfactorily explained by the statistical laws of large numbers.&nbsp; [Born,&nbsp;1949]  However, individuals who trust AI tools to overcome their own cognitive limitations become susceptible to illusions of understanding in which they believe that they understand more about the world than they actually do. Such illusions obscure the scientific community’s ability to see the formation of scientific monocultures in which certain methods, questions and viewpoints come to dominate alternative approaches, making science less innovative and more vulnerable to errors. The proliferation of AI tools in science risks introducing a phase of scientific enquiry in which we produce more but understand less.&nbsp; [Messeri &amp; Crockett, 2024]当然，种种质疑并不会消减各领域学者在研究实践中对 AI 工具的澎湃热情——无论它最终能否指向科学的真正进步，效率至上的当代学术界都没有理由拒绝这场前所未有的知识生产力革命。从另一个角度想，AI 事实上正在加速科学思想性与实用性的分离——也许在未来的某一天，更高形态的机器智能或将全面主导应用科技，而传统科学是否会像文学、哲学或古典艺术一样退居为一种思想文化载体并从此离开技术实践前沿？那时的科学会比今天更加纯粹吗？科学家能因此拥有更多的精神自由吗？ 6 +我向往科学研究中的自由与纯粹，但我不相信它们可以通过规避科学的现实维度来获得。在我的认知中，科学革命不仅依靠新思想取代旧思想，更重要的是凭借新思想衍生的新技术对社会生活的全方位改变；相反，与真实世界的割裂往往预示着一个知识领域生命能量的逐步衰竭。我认为科学与科学家必须与时代同步演进；因此，理解不同时代的需求与挑战应该是每一名学者的终身功课。我的博士学业完成于生成式人工智能热潮开启的几个月前；最近我突然意识到：自己或许属于信息化社会中成长与教育全过程没有 AI 显著参与的最后一代人。这个时间巧合意味着什么呢？相较于从小与机器共同学习并体验世界的未来世代，我们原则上应该能够更完整地保留作为「人」的思考本能——比如对自然的好奇，对真相的渴求，对规训的质疑，还有对人类生存发展境遇的关注；而相比那些在平稳繁荣年代度过大半人生的前辈，青年阶段经历的知识与社会环境变动或许能让我们提早明白世界的复杂与人性的珍贵。很显然，AI 并不是当下触发大家时代性焦虑的唯一话题——自六年前的新冠疫情以来，人类历史仿佛经过了一个由盛转衰的临界点，正在步入一个以危机、动荡、失落、恐慌为主题的新纪元；冲突和对立变成了国家地区之间的常态，对和平与发展的企盼逐渐成为一种美好的怀旧情结；不同群体和阶层的利益诉求日益割裂，跨越观念立场的有效沟通愈发困难；秩序在动摇，协作在解体，偏见在扩散；许多人不再期待未来，而只想在一切变得更加糟糕之前尽情索取，然后把其余交给命运来安排。  Things fall apart; the centre cannot hold;   Mere anarchy is loosed upon the world,   The blood-dimmed tide is loosed, and everywhere   The ceremony of innocence is drowned;   The best lack all conviction, while the worst   Are full of passionate intensity.   [Yeats,&nbsp;1920]过去一年里，我曾听到不同的人将当前的时局类比于两次世界大战之间的二十年——新冠疫情与一战夺去了相近数量的生命，也解除了一代人心中悲观与愤怒情绪的封印；新一轮更大规模的危机若影若现，局部甚至已经显露出与历史高度相似的征兆。但也有人对此不以为然——他们会指向活跃的资本市场或海量的学术论文，强调高速的知识与商业增长定会将不安宁的世界带离险境。可是我们不应该忘记：两次世界大战前后正是西方科学技术发展最快的时期；至于对历史走向的影响，比科技本身更加关键的实则是科技与人类社会的具体关系。  Man baut Riesenhäuser, höher als die Pyramiden oder als die Peterskirche in Rom, man baut Riesenflugzeuge, von denen jedes imstande ist, mehr Menschen zu vernichten als die große Armada Philipps II. von Spanien. Man hat Mittel gegen die furchtbarsten Krankheiten gefunden, und man weiß die wunderbarsten Sachen. Man hat für alle möglichen Naturerscheinungen Formeln gefunden, die so geheimnisvoll und so merkwürdig sind, daß nur ganz wenige Menschen sie verstehen. [...] Taglich weiß man ein kleines Stückchen mehr über die Natur und auch über den Menschen selbst. Aber die Not ist noch immer ungeheuer. Viele, viele Millionen Menschen könnenkeine Arbeit finden auf unserer Erde und jährlich verhungernviele Millionen. Alle hoffen wir auf eine bessere Zukunft, sie mußdoch kommen!&nbsp; [Gombrich,&nbsp;1936]  Transl.&nbsp; People build gigantic buildings, far higher than the pyramids or St Peter’s church in Rome. They make great aeroplanes, each one capable of killing more people than the whole of Philip II of Spain’s Invincible Armada. Ways have been found to combat the most fearsome diseases. There have been amazing discoveries. People have found formulas for all sorts of things that happen in nature which are so mysterious and so remarkable that few people understand them. [...] Every day we know a little more about nature, and about human nature too. But the horror of poverty remains. There are many millions of people on our earth who cannot find work and every year millions die of starvation. We all hope for a better future—it must be better!&nbsp; [Gombrich,&nbsp;2005]今天我们又在面对怎样的现状呢？科技当然在进步，但知识创新最直接的受益者往往是特定的精英群体而非大多数人；学术的殿堂依旧矗立，但曾经以教书育人为先的高等学府正在加速转型为资本财团、学位商铺和科研工厂；知识圈外，普通民众对科学的误解与怀疑持续扩散；一部分学者曾希望躲在象牙塔内回避世事纷乱，然而今年年初以来美国高等教育与科研系统遭遇的大规模政府制裁终究打破了这种幻想。或许真正扰动世界的不只是几种病毒、几名政客和几个大语言模型，还有科技与商业社会长期累积的结构性矛盾，以及人类文明在现代化进程中的本征周期振荡。我们能从这样的时代环境中得到哪些有关事业方向的启示呢？又应该做出哪些观念与心态上的调整呢？ 7 +以往我很少刻意写下个人的年终总结或者新年愿景，如今却觉得自己也需要这样的流程仪式——在一个容易迷惘的人生阶段，面对复杂多变的开放世界，我必须知道自己现在究竟在干嘛以及未来到底想干嘛。我希望这些记录最终能拼凑出一张帮助自己探索未来的导航地图。在新的一年里，我会继续用超导量子技术助力基础物理研究；但我更想探寻量子物理和量子信息学与其它科学分支的本质或衍生关联，特别是那些有潜力产生崭新思想方法或具体应用前景的交叉方向。我想在学习利用机器智能的同时更多了解生物智能的原理机制，并试图从物理和信息的互补视角认识物质与生命的连接。我想更主动地关注专业以外的科技新趋势，开拓自己的知识视野与研究思路，努力发掘前沿科学对现实世界可能的积极影响。我想在工作之余坚持学习通识知识和欣赏艺术作品，希望那些跨越时间、文化与学科界限的真与美能够指引我的事业与精神追求。我想更多地观察探访加州与美国，采集这片土地上的历史文化和人们真实的生活方式，并思考它当下困境的来源与出路。我想更用心地捕捉生命中遇见的人文主义与启蒙精神，学着用文字或图像记录那些无法由科技或社会机器生成的人性光辉瞬间。最后，我会对未来保持信心——身处一个起伏动荡的时代，我们更应该勇敢地去做天真的乐观主义者，因为除此之外我们别无选择。  — Qu’est-ce qu’optimisme ? disait Cacambo. — Hélas ! dit Candide, c’est la rage de soutenir que tout est bien quand on est mal.&nbsp; [Voltaire,&nbsp;1759]  Transl.&nbsp; “Optimism!” said Cacambo, “what is that?” “Alas!” replied Candide, “it is the obstinacy of maintaining that everything is best when it is worst”&nbsp; [Voltaire,&nbsp;1920]人在不同的成长阶段对「理想」会有不一样的定义——学生时代的理想是正确努力后一定会取得的成绩，是前方一望无际的发展空间；往后，理想开始关于令人困惑的方向抉择和没有正确答案的价值判断；再后来，我们渐渐学会直面寻找理想途中的环境约束与身心压力；最近我开始依稀感悟到：真正的理想主义是主动与孤独为伴的选择，是在黑暗中守望光明的信念感，是在破碎甚至荒谬的现实中追逐恒久意义的智慧与勇气。  Ce sont les autres coqs. Ils chantent dans du rose .&nbsp;.&nbsp;.   Ils croient à la clarté dès qu’ils peuvent la voir.   Ils chantent dans du bleu . . . J’ai chanté dans du noir.   ― Ma chanson s’éleva dans l’oiubre, et la première.   C’est la nuit qu’il est beau de croire à la lumière&nbsp;!   [Rostand,&nbsp;1910a]  Transl.&nbsp; The other Cocks. They are singing in the rosy light ― Yes, they believe in the light as soon as they see it. They sing all in a haze of blue ― I sang in total blackness. My song rose from the cheerless shade, and was the first to rise. It is when Night prevails that it’s fine to believe in the Light!&nbsp; [Rostand,&nbsp;1910b]我不敢自称为理想主义者——从小到大一路顺利的求学与工作轨迹使得我事实上还从未遭遇过真正的逆境考验；眼下的一些自我怀疑与追问，实则是独立探索大千世界必经的心路历程——既已离开舒适环境的庇护，我们需要更加谨慎地审视自己的目标追求，判别世间的是非对错。我认为这不是教育的终结，而是新阶段人生教育的开始。年中被朋友圈的一波动态提醒：今夏是 2015 届本科生的毕业十周年。时光荏苒，昔日同窗如今多数已经成家立业，而自己仍在地理与精神双重意义上的异乡漂泊，不知几年后又将身处何方、思虑何事。而立之年的漂泊可能是孤独甚至痛苦的，但这种孤独以及由不确定性带来的憧憬也可以是令人喜悦的——它至少说明我们心智维度上的生命仍在延续，对知识价值与意义的信念尚未消散，与外部世界的对话和抗争仍未停止。或许从未来的某一刻蓦然回望，会发觉这其实是一段无比美好的时光。2025 年终于圣巴巴拉参考资料 +\t[Anderson,&nbsp;1995] &ensp;Philip W. Anderson, “Historical overview of the twentieth century in physics” in Twentieth Century Physics, vol.&nbsp;3, eds. Laurie M. Brown, Abraham Pais &amp; Brian Pippard (Bristol: Institute of Physics Publishing; New York: American Institute of Physics Press, 1995), pp. 2017–2032.\t[Babbitt,&nbsp;2003] &ensp;Milton Babbitt, “The composer as specialist” in The Collected Essays of Milton Babbitt, ed. Stephen Peles (Princeton: Princeton University Press, 2003), pp. 48–54.\t[Born,&nbsp;1949] &ensp;Max Born, Natural Philosophy of Cause and Chance (London: Oxford University Press, 1949).\t[Bush,&nbsp;1945] &ensp;Vannevar Bush, Science: The Endless Frontier (Washington: United States Government Printing Office, 1945).\t[Carreyrou,&nbsp;2018] &ensp;John Carreyrou, Bad Blood: Secrets and Lies in a Silicon Valley Startup (New York: Alfred A. Knopf, 2018).\t[Devoret, 1997] &ensp;Michel H. Devoret, “Quantum fluctuations in electrical circuits” in Fluctuations quantiques / Quantum Fluctuations, École d’été de physique théorique, Les Houches, Session LXIII, 1995, eds. Elisabeth Giacobino, Serge Reynaud &amp; Jean Zinn-Justin (Amsterdam: North-Holland, 1997),  Smollett (New York: Pantheon Books, 1920).\t[Weinberg,&nbsp;1963] &ensp;Alvin M. Weinberg, “Criteria for scientific choice”, Minerva 1, 159 (1963).\t[Yeats,&nbsp;1920] &ensp;William Butler Yeats, “The Second Coming” in Michael Robartes and the Dancer (Churchtown, Dundrum: Cuala Press, 1920).",

        "content": "Illustration: Niklas Elmehed © Nobel Prize Outreach  作者注：本文由「正文」与「后记」两部分组成——其中正文为 2025 年诺贝尔物理学奖的通俗简介（英文版已于加州大学圣巴巴拉分校的合作媒体平台 The Conversation 在线发表）；后记部分则通过原始文献与口述历史对此次获奖工作的历史意义和现实影响稍作探讨。读者可根据兴趣选择阅读其中的部分或全部内容。10 月 7 日，瑞典皇家科学院宣布将 2025 年诺贝尔物理学奖授予首先在人造电路中发现宏观尺度量子力学的三位物理学家——John Clarke &ensp; 约翰·克拉克Michel H. Devoret &ensp; 米歇尔·德沃雷 John M. Martinis &ensp; 约翰·马蒂尼斯今年适逢量子力学理论创立一百周年。诺贝尔物理学奖也在继 2012 年与 2022 年后再次表彰当代量子物理前沿领域的奠基性实验工作。 量子物理与量子机器在人们的通常概念中，量子力学是微观物质世界的物理理论，主要适用于描述原子、分子和亚原子基本粒子的运动规律。自上世纪以来，量子物理的科学成果衍生出了广泛而深刻的实际应用——包括精密测量、激光技术、医学成像以及基于半导体器件和集成电路的现代计算机与电子信息系统。然而迄今为止，科学家与工程师们对量子物理许多细节规律的认识依然有限。这其中一个不容忽视的原因是：微观粒子的极小尺度为量子力学的实验与应用带来了天然的挑战。二十世纪后期，世界各地的物理学家陆续开始在特殊实验条件下直接研究单个微观粒子（比如原子或光子）并控制、测量它们的量子力学行为。由此产生一系列重要进展开启了一个如今被称为量子工程的新兴研究领域。量子工程的核心方法是在人造系统或环境中进行高度可控的量子物理实验，从而追求对量子力学基本规律的深入理解，并积累更具突破意义的技术发明。这中间一个备受关注的研究方向是量子信息处理，其目标在于利用量子力学原理（比如物体同一时刻能够处于不同经典状态的量子叠加、多个物体之间允许存在超越经典关联的量子纠缠等等）对信息进行编码、运算、传输、检测等操作。与传统的电子信息技术相比，量子信息系统在面对计算、模拟、加密、传感等领域的某些特定任务时会具备理论上不同程度的性能、效率或安全优势。但是在现实中，实现这类拥有特殊信息处理功能的量子机器难度极大——它要求科学家必须掌握高度可靠、可控并同时能在复杂的人造实验环境下保持量子力学特性的物理元件；换言之，我们需要尝试挑战自然规律表面上的尺度界限，让原本属于微观世界的量子物理定律显现于宏观规模的工程系统中。这样的「宏观量子机器」有可能存在吗？如果可能，它会有怎样的具体原理与结构呢？ 宏观超导量子电路1985 年 10 月，彼时正于加州大学伯克利分校工作的三位年轻科学家（也是今年的三位诺贝尔物理学奖得主）发表了一组极具开创性研究结果——通过严格实验，他们在超导电路中首次发现了遵循量子力学定律的宏观物理变量。超导是一种物质在低温或高压下的特殊状态，它最为人熟知的性质是「消失」的直流电阻。在超导体中，原本独立运动的电子两两结合成为库珀对 (Cooper pair)——它们是超导电流的微观载体；数以亿万计的库珀对会凝聚于一个宏观基态，其波函数拥有一个相位变量，能够描述大量库珀对的集体运动。在日常经验里，我们对这种表现微观粒子集体运动的宏观变量其实并不陌生。一个简单的例子是质心运动——小球、摆锤之类的宏观物体都由微观尺度的原子组成；但在许多经典力学问题中，人们往往只关心物体质心所代表的原子集体运动模式，而不会追踪每个原子的单独轨迹或者众多原子之间的相对移动。因此在直观上，库珀对凝聚体的相位变量可以类比于小球或摆锤的质心坐标——二者本质皆为大量微观粒子集体行为的宏观表述。为了观察验证超导相位变量的宏观量子特性，三位科学家选择使用了一种叫做约瑟夫森结 (Josephson junction) 的电路元件——它由两侧的超导体和中间一层纳米厚度的绝缘体组成；由于库珀对的量子隧穿效应，约瑟夫森结不仅能够传导超导电流，还可以产生可控的非线性电压—电流关系——这是能在宏观尺度检验量子力学的关键。在实验中，三人小组通过仔细设计的滤波电路将一个电流偏置的约瑟夫森结与周边电磁环境尽量隔离，并借助稀释制冷技术使其处于极低温下（最低可低于 −273.13 °C 或者绝对零度以上 0.02 摄氏度）。他们清晰地测量到了约瑟夫森结两侧规范不变相位差的宏观量子隧穿或逃逸现象——通俗地说，就是量子力学允许物体无需越过运动路径上势能的最高点即可出现在其另一侧。需要特别注意的是：这种宏观量子隧穿与前段提到的库珀对穿过约瑟夫森结中间的绝缘薄层是两个截然不同的物理过程——后者是纳米尺度的微观量子现象，而前者则是宏观物理变量（运动自由度）的量子行为。电流偏置约瑟夫森结的等效势能图示：在超导状态下，系统的动力学可用相位变量差 φ 的一维宏观运动描述。蓝色实线轨迹 (C) 对应经典物理规律下的「逃逸」路径——物体必须有足够的能量越过蓝色虚线位置所示的势能最高点；但即使物体能量不足以越过势垒，红色虚线指代的宏观量子隧穿过程 (Q) 仍然可以发生。在现实中，观察到明显的宏观量子隧穿现象所需要的实验温度通常远低于电路材料自身的超导临界温度。 电流偏置约瑟夫森结的等价宏观力学模型：圆形单摆相对于竖直位置的夹角 φ 对应约瑟夫森结两侧的相位变量差；另一块方形重物通过细绳缠绕悬挂在摆轴上，代表外加偏置电流对系统能量的影响；蓝色实线 (C) 与红色虚线 (Q) 分别指代单摆顺时针摆至平面右侧的经典力学轨迹与量子隧穿过程。上下两图中以相同记号标注的物体势能局部最低点（黑色实线）、局部最高点（蓝色虚线）和逃逸后位置（黑色虚线）逐一对应——它们是同一物理模型的不同直观图像展示。 受原子光谱测量的启发，三位科学家还用频率接近当今无线网络 Wi-Fi 信号的微波电磁辐射来激发实验电路，结果如预期观测到了分立的量子化能级——这也通常是原子、分子等微观粒子才具有的量子物理特征。这组实验所使用的超导量子电路样品于是成为了最早的人造原子——它既是通过工程方法设计与制造的宏观器件，却又与天然原子一样严格遵守量子力学规律。经典与量子世界之间的一个重要尺度边界从此被打破。 人造原子与量子计算超导人造原子的发明对此后量子物理与技术的发展产生了深远影响。在基础科学意义上，它证实了支配微观粒子的量子力学定律同样适用于人造系统中的宏观变量。与此同时，宏观量子电路的成功实验也为科学家实现构想中的复杂量子机器提供了全新的方案——除了天然的原子或光子，量子机器的组成单元还可以是与传统集成电路形态类似的固体器件，而后者由于灵活的参数设计和与现代工程技术的良好兼容为实验与理论研究提供了广阔的探索空间。自上世纪九十年代起，世界范围内越来越多的实验室（包括三位诺贝尔奖得主各自领导的研究组）开始以超导量子电路为基础尝试构建量子计算机的实验模型，并取得了许多令人振奋的研究突破。组成这些「量子芯片」的基本物理元件是超导量子比特——每个超导量子比特都包含一个或多个约瑟夫森结，其本质是构型更复杂、量子特征更显著的人造原子。截至目前，科学家已经可以在实验中快速、精确地实现超导量子比特的状态预设、逻辑控制、远程纠缠、非破坏测量以及简单的量子逻辑编码与纠错，并能用其执行一些最初级的量子计算与模拟任务；但是这些人造量子电路的进一步性能提升和系统集成仍然面临巨大的原理与技术挑战。 后记：量子力学的未知边界二十世纪初，物理学经历了自近代以来最为深刻的概念与理论革命——相对论与量子力学的建立开启了人类认识自然基本规律的新纪元。特别是以违反直觉著称的量子力学因其对微观粒子运动强大的解释与预测能力成为了现代物理学最重要的基石。时至二战前后，量子力学的理论框架已趋于成熟；它在物理学的各个分支（例如原子物理、固体物理、核物理、粒子物理等）以及化学与工程学科中的具体应用也愈发广泛，并直接催生了包括半导体晶体管在内的诸多重要技术发明。不过与此同时，于实践层面极其成功的量子力学却一直存在若干悬而未决的基本理论问题，其中之一便是——量子力学的适用范围究竟是什么？或者说，量子物理与经典物理的具体边界到底在哪里？一个清晰、明确的适用范围是任何科学理论得以有效的必要前提。然而时至今日，科学家对于量子力学适用边界的认知依然相当模糊：在小规模的微观粒子体系及其简单累积产生的一些宏观物理现象（比如材料的理化性质）中，量子力学毫无疑问是成立的；但是我们日常接触的宏观物体则从未直接表现出宏观尺度上的量子行为。换言之，在分别以「原子、电子、光子」和「小球、钟摆、生物」为代表的两个物质世界之间存在一条「量子」与「经典」的分界线，可它的准确定义与理解自量子力学诞生之初就一直困扰着物理学家们。与现代物理学的其它主要理论成就对比，量子力学「适用范围不明」的问题显得尤其突出。相比之下，相对论在很大程度上可被视为经典力学在高速运动与强引力情形下的修正（最浅显的例子是，狭义相对论的基本公式都可以在物体运动速度远小于光速的低速极限下自然过渡到熟悉的牛顿力学形式）；可是量子现象与理论的许多本质特征——包括但不限于波粒二象性 (wave–particle duality)、非连续性 (discontinuity)、不确定性 (uncertainty)、非定域性 (nonlocality) 等等——都不存在经典世界的直接对应。如果简短总结，我们只能笼统地说量子力学会在物质体系的作用量 (action) 接近普朗克常数量级时得到显著表现，而对物体的尺寸、重量、粒子数、复杂度等属性都没有内在要求。 ∗ &emsp; ∗ &emsp; ∗ 那么，量子力学有可能也适用于宏观世界吗？1935 年，Erwin Schrödinger 提出了著名的猫佯谬 (cat paradox)，用近乎诙谐的方式展示了将量子理论简单推广至宏观物体乃至高等生物后会导致的荒谬结果。让一只猫处于生与死两种状态的量子叠加显然是不现实的；但另一方面，Schrödinger 的思想实验（及其各种衍生版本）却也吸引了一些物理学家去尺度远大于原子、分子的系统中探寻量子力学的踪迹。上世纪中叶，科学家寻找「薛定谔猫」的努力开始取得一些进展——人们在超导体 (superconductor)、超流体 (superfluid) 等低温下的特殊物质状态中观察到了诸如磁通量子化 (flux quantization) 等宏观量子现象。如正文中解释，这些效应起源于超导与超流体中大量微观粒子凝聚形成的宏观基态。那我们能否由此宣称量子力学在宏观尺度必定成立呢？七十年代末至八十年代，彼时已因解释 3He 超流现象而闻名学界（并后来因此获得 2003 年诺贝尔物理学奖）的理论物理学家 Anthony Leggett 在一系列报告与论文  [Leggett, 1978; 1980; 1984a; 1984b; 1987] 中提出了一个犀利而深刻的观点：他认为此前人们在超导、超流等体系中发现的所谓「宏观量子现象」与真正意义上的宏观量子力学存在本质区别——前者仅是微观量子物理机制的宏观累积，而后者的确凿验证需要在具体实验中观测到一个宏观物理变量无歧义的量子力学行为——例如宏观量子隧穿 (macroscopic quantum tunneling) 或者宏观量子相干 (macroscopic quantum coherence)。  [...] the phenomena in superfluid systems which are conventionally cited as evidence for the validity of quantum mechanics on the macroscopic scale do not in themselves require the introduction of high-D (disconnectivity) states. To put it another way, the explanation of these phenomena in the standard quantum-mechanical way requires only that one- and two-particle correlations are predicted correctly by Schrödinger’s equation; it does not require that N-particle correlations are correctly predicted, except in so far as they are factorizable in terms of 1- and 2-particle correlations.&nbsp;  [Leggett, 1980]    [...] is it in principle impossible to observe the effects of superposition of quantum mechanical states corresponding to macroscopically different properties? [...] The most convenient way to discuss the question [...] is to introduce the idea of a macroscopic variable, that is, a variable such that &lsquo;appreciably&rsquo; different values of it correspond to states which are macroscopically distinguishable, and to ask what are the necessary conditions for a quantum mechanical description of the dynamics of such a variable to lead to results appreciably different from a classical description.&nbsp;  [Leggett, 1984a]  在这些文章中，身为理论学者的 Leggett 还为自己的实验同行给出了准确的方向性建议——他认为满足量子力学规律的宏观变量最有希望在包含约瑟夫森结的超导电路中被首先发现。 ∗ &emsp; ∗ &emsp; ∗ Leggett 的新颖提议引起了当时任教于加州大学伯克利分校的 John Clarke 及其实验室博士后 Michel Devoret 和博士生 John Martinis 的极大兴趣。Clarke 的研究组在超导约瑟夫森电路的制备与测量方面有丰富的经验，而彼时刚从法国取得博士学位的 Devoret 则带来了此前于低温核磁共振研究中积累的稀释制冷与微波电子学技术。三人当即决定在伯克利的实验室开始这项令人期待的研究。首先，三位科学家选择了一个与 Leggett 的最初设想方案稍有不同的实验系统——外加偏置电流的约瑟夫森结。所有可行方案的共同点是：实验电路必须具备非线性 (nonlinearity) 或非谐性 (anharmonicity) 方允许研究者通过相对简单的物理测量对量子力学与经典物理规律作出明确区分——这条规则至今仍在人造原子或量子比特的设计中被普遍沿用。  [...] it is of central importance that the well be anharmonic. The quadratic potential of a simple harmonic oscillator leads to spacing between energy levels that is independent of level number for all quantum numbers. Conversely, transitions between levels of an anharmonic well with small quantum numbers can be straightforwardly resolved, unlike for large quantum numbers where Bohr’s correspondence principle should always hold. As Leggett has emphasized so eloquently, the use of an anharmonic oscillator enables one “to evade the correspondence limit”.&nbsp;  [Martinis et al., 2020] 在此基础之上，偏置电流 (bias current) 的设置为实验系统引入了巧妙的测量机制——超导相位变量差的逃逸或隧穿被转换和「放大」为一个更容易直接测量的宏观电压信号。测量方法的不断创新改进也成为超导量子电路四十年来的发展主线之一。  Quantum effects are usually unobservable on the macroscopic scale because they involve microscopic quantities. Macroscopic quantum tunneling is a particularly sensitive technique to reveal them because a single tunneling event switches the system from the zero voltage state [...] to the gap voltage state [...] As in a Geiger counter, these states are easily distinguished; the only competing classical process giving “false counts” is thermal activation, which can be “frozen out” in a well-understood way by cooling to a sufficiently low temperature.&nbsp;  [Tinkham, 1996] 最后，量子物理实验往往需要苛刻的环境条件——对于人造量子电路，两项最核心的要求是电磁屏蔽与低温，目的都是尽量隔绝外部环境对量子系统各种形式的噪声干扰。其中，实验温度对应的热噪声需要远低于量子化能级之间的跃迁能量——现实中一般在 10 mK 量级，能且仅能通过稀释制冷 (dilution refrigeration) 技术连续维持。今天的超导量子计算实验仍旧遵循相同的温度要求（注：它除了必须远低于电路材料自身的超导临界温度外与后者并无直接关联）。  Our usual observations on a billiard ball or Brownian particle reveal classical behavior because Planck’s constant ħ is so tiny. However, at least in principle there is nothing to prevent us from designing an experiment in which these objects are quantum mechanical. To do so we have to satisfy two criteria: (i) the thermal energy must be small compared with the separation of the quantized energy levels, and (ii) the macroscopic degree of freedom must be sufficiently decoupled from all other degrees of freedom if the lifetime of the quantum states is to be longer than the characteristic time scale of the system.&nbsp;  [Clarke et al., 1988]  明确以上主要设计思路后，三人小组在余下的两年时间内完成了实验搭建、样品制备以及所有关键结果的测量与分析，并用两篇实验论文 [Devoret et al., 1985; Martinis et al., 1985] 汇报了宏观量子隧穿与能级量子化的发现。他们随后在 1987 年发表的另一篇总结性论文中如此概述自己的研究动机与结论——  Do macroscopic degrees of freedom obey quantum mechanics? Until recently, the answer to this question was beyond the reach of experimentalists. Quantum mechanics survived at the macroscopic level only through collective phenomena such as superfluidity, superconductivity, flux quantization, or the Josephson effect. Although these phenomena are conventionally described as being “macroscopic,” they are in fact manifestations on a macroscopic scale of the coherent addition of microscopic variables each governed by quantum mechanics. [...] This paper describes experiments on a system that, although it contains a large number of atomic constituents, is atomlike in the sense that it has such a single degree of freedom behaving quantum mechanically.&nbsp;  [Martinis et al., 1987] 从时间线上回顾，伯克利三人组并非首个尝试于超导约瑟夫森电路中寻找宏观量子隧穿现象的研究团队；但是他们实验的严谨性与说服力要明显高于之前发表的同类工作。其中最关键的一点是：三位科学家与期间参与部分研究的 Daniel Estève 一起对实验中的超导电路进行了准确的建模分析，并通过多个辅助与对照实验独立测得了全部模型参数，最终实现了实验数据与理论预期之间无需任何变量拟合的直接比对——这使得宏观量子力学从此成为「超越合理怀疑」的科学事实。 ∗ &emsp; ∗ &emsp; ∗ 宏观量子隧穿的发现具有怎样的意义？三位诺贝尔奖得主当年的回答如今看来相当有趣——  Can one conclude that macroscopic degrees of freedom always obey Quantum Mechanics? At this point, the experimentalist can choose between two attitudes: the Utopist’s or the Pragmatist’s.   For the Utopist, who worries about the “crazy framework of (probability) amplitudes” of Quantum Mechanics, the answer to the above question is “no”. He must pursue the search for an experiment that would show the limits of validity of Quantum Mechanics. [...]   For the Pragmatist, who wants to use this new macroscopic Quantum Mechanics, the answer to the question is “yes, probably”. He is inclined to explore new superconducting circuits that would perform quantum signal processing [...] Finally, the Pragmatist can dream of building exotic macroscopic “atoms with wires” that would display new quantum phenomena with no equivalents in the microscopic world.&nbsp;  [Devoret et al., 1987] 简言之，科学家从此可以基于超导人造原子开发更多具有基础研究或实际应用价值的量子电路；但至于量子力学的宏观检验，这项发现仅仅是一个起始——为了充分理解经典物理与量子物理的边界，我们还必须找到量子力学在宏观尺度有效性的局限证据，例如观测到物体不同经典状态有限时间寿命的量子相干叠加。2000 年前后，日本、欧洲、美国的多个实验室陆续在几类不同构型的超导人造原子中观察到了宏观量子相干现象。此后，超导人造原子有了另一个更为人熟知的名字——超导量子比特 (superconducting qubit)。2004 年，耶鲁大学的研究团队首次在超导电路中观察到了量子比特与微波光子的量子化相互作用；这一实验体系及其物理原理被命名为电路量子电动力学 (circuit quantum electrodynamics)。超导量子比特与电路量子电动力学的发明开启了量子信息技术的新篇章——光子与人造原子从此可以在固态电路系统中被灵活地设计与组合，作为宏观量子机器的两类基本元件；科学家们也开始严肃思考下一个更长远的研究目标——超导量子计算机。量子计算与人造原子的概念设想几乎同时起源于八十年代初，但两个研究领域直至九十年代末才发生明显的交汇——超导量子电路作为量子计算的潜在硬件平台开始受到广泛关注。谈及量子计算，信息科学背景的研究者也许会首先被其解决特定问题的算法优势所吸引；但在物理学的视角下，量子计算机本质是一个高度复杂的人造量子系统，它的物理实现会将针对量子力学适用范围的实验检验引向新的维度。2007 年 5 月，Devoret 在出任法兰西学院 (Collège de France) 介观物理学讲席教授的就任演讲 (leçon inaugurale) 最后阐述了人造量子机器对于人们探索量子力学复杂性前沿的特别意义——  Je voudrais terminer sur une question donc très hasardeuse, mais qui a motivé en fait une partie des expériences initiales en physique mésoscopique : en préparant des systèmes de très grande complexité, il serait peut-être possible de découvrir un nouvel axe — un axe dans le suivant lequel la mécanique quantique cesserait d’être valable. De nombreux physiciens sont complètement en désaccord avec cette idée ; ils considèrent que la mécanique quantique est le socle de base sur lequel doit être construite toute la physique et ne peut pas être remis en question. D’autres physiciens pensent au contraire que c’est une théorie préliminaire provisoire, un peu comme l’élasticité l’était au début de ce siècle.&nbsp;  [Devoret, 2008]  Transl.&nbsp; I would like to end with a therefore very uncertain question, which, in reality, nevertheless motivated some of the initial experiments in mesoscopic physics: by preparing systems of very high complexity, it might be possible to discover a new axis—an axis along which quantum mechanics would cease to be valid. Many physicists completely disagree with this idea; they consider quantum mechanics as the basic foundation which all physics must be built on and cannot be questioned. Other physicists, on the contrary, regard it as a provisional, preliminary theory, somewhat like elasticity was at the beginning of this century.  换言之，作为应用研究目标的量子机器同时也是探究量子理论基本问题的强大实验工具——在此意义下，基础科学的未知边界需要通过工程方法得以扩展乃至重新定义。 ∗ &emsp; ∗ &emsp; ∗ 2010 年代以来，量子计算正逐渐从纯粹的学术研究过渡向需要学术界与工业界互相协作的系统工程。最近十年间，Martinis 与 Devoret 都不同程度地领导或参与了工业界实验室的量子计算项目。可当被问及对于量子计算机的兴趣与展望，两位超导量子电路的共同发明人最多提及的还是在复杂人造系统中检验、突破量子力学宏观极限的「初心」——  At the scientific level, we were testing in a practical manner whether the ideas of quantum mechanics and computing were really correct at a huge scale. Physicists expected it to work, especially the theorists, but the job of experimentalists is to test whether it actually works. [...] So, for me, the most important part is the test of quantum mechanics. That’s the real practical reason I wanted to do the experiment.&nbsp; [Martinis, 2021]   Although there are experiments that test the fundamental principles of quantum mechanics and agree with theoretical predictions at the level of many decimals, it’s not impossible that there are some limitations in the postulates of quantum theory that will manifest themselves in new, specially designed experiments, for instance those testing large-scale entanglement. [...] Large-scale quantum computers are prime tools in this endeavor [...]&nbsp; [Devoret, 2021] 从 1985 年至今，超导量子电路的理论设计与实验方法都已历经了若干代的演化改进。目前人们基本能够证实：在包含几十到上百个人造原子的量子电路中，标准形式的量子力学大概率仍是成立的。但它在更大规模的量子系统中也一定成立吗？为了给出确定回答，人们需要不断测试越来越复杂的量子机器——直至现有的量子理论出现与实验结果无法调和的困难为止。在这条探索道路上，设计、制造大型量子机器的技术挑战是显然的；但我们同时应该看到：更现实的挑战并不止于技术层面。如今，比较复杂的量子计算实验经常需要几十到几百名研究人员共同参与；在可预见的将来，这一数字以及相应的资源需求还将继续增长，甚至有可能接近所谓的「大科学」规模。上世纪以来某些研究领域（例如实验高能物理）的历史经验告诉我们：对于以规模扩展 (scaling-up) 为主要度量指标的科研方向，它们的发展极限往往更直接受制于有限的经济资源——这本质上是现代科学公共社会属性的一种具体呈现。人类对于量子世界的认知边界最终会在哪里？与许多知识领域的未来之问一样，它或许并不是一个单纯的知识问题。其中科学家能做的除了砥砺前行，还有积极寻求新的探索角度——比如在规模扩展以外，我们是否还有其它路径接近量子物理的未知前沿？答案是非常肯定的。一些已经存在的具体例子包括：天然或人造原子的连续测量实验极大地加深了物理学家对量子跃迁 (quantum jump) 和量子轨迹 (quantum trajectory) 等概念的科学理解，它们与量子力学的另一大基本理论难题——测量问题 (measurement problem) 有很直接的联系；再比如，各种人造量子系统已经成为研究量子多体物理 (quantum many-body physics) 的重要平台；此外，许多基于量子物理实验的精密测量方法已被应用于探测未知基本粒子或自然基本常数的时间演化，以及材料与生命系统中的新奇现象……知识与实践也许会有边界，但不应被穷尽的是人类面对自然规律的求知欲和基于科学方法的创造力。我想这大概也是诺贝尔物理学奖希望向世界传递的信息。量子力学的下一个百年，让我们一起努力。2025 年 10 月于圣巴巴拉和纽约原始文献列表\t[Clarke et al., 1988] \t&ensp;J. Clarke, A.N. Cleland, M.H. Devoret, D. Estève, &amp; J.M. Martinis, “Quantum mechanics of a macroscopic variable: The phase difference of a Josephson junction”, Science 239, 992 (1988).\t[Devoret et al., 1984] &ensp;M.H. Devoret, J.M. Martinis, D. Estève, &amp; J. Clarke, “Resonant activation from the zero-voltage state of a current-biased Josephson junction”, Physical Review Letters 53, 1260 (1984).\t[Devoret et al., 1985] &ensp;M.H. Devoret, J.M. Martinis, &amp; J. Clarke, “Measurements of macroscopic quantum tunneling out of the zero-voltage state of a current-biased Josephson junction”, Physical Review Letters 55, 1908 (1985).\t[Devoret et al., 1987] &ensp;M.H. Devoret, J.M. Martinis, D. Estève, &amp; J. Clarke, “Experimental observation of the quantum behavoir of a macroscopic degree of freedom” in Le hasard et la matiére / Chance and Matter, École d’été de physique théorique, Les Houches, Session XLVI, 1986, eds. J. Souletie, J. Vannimenus, &amp; R. Stora (Amsterdam: North-Holland, 1987), pp. 509–523.\t[Devoret, 2008] &ensp;M.H. Devoret, De l’atome aux machines quantiques, Leçon inaugurale du Collège de France (Paris: Fayard, 2008).\t[Devoret, 2021] &ensp;M.H. Devoret, interview by D. Zierler, 7 April 2021, Oral History Interviews, Niels Bohr Library and Archives, American Institute of Physics.\t[Leggett, 1978] &ensp;A.J. Leggett, “Prospects in ultralow temperature physics”, Journal de Physique Colloques 39(C6), 1264 (1978).\t[Leggett, 1980] &ensp;A.J. Leggett, “Macroscopic quantum systems and the quantum theory of measurement”, Progress of Theoretical Physics: Supplement 69, 80 (1980).\t[Leggett, 1984a] &ensp;A.J. Leggett, “Macroscopic quantum tunnelling and all that” in Essays in Theoretical Physics: In Honour of Dirk ter Haar, ed. W.E. Parry (Oxford: Pergamon, 1984), pp. 95–127.\t[Leggett, 1984b] &ensp;A.J. Leggett, “Schrödinger’s cat and her laboratory cousins”, Contemporary Physics 25, 583 (1984).\t[Leggett, 1987] &ensp;A.J. Leggett, “Quantum mechanics at the macroscopic level” in Le hasard et la matiére / Chance and Matter, École d’été de physique théorique, Les Houches, Session XLVI, 1986, eds. J. Souletie, J. Vannimenus, &amp; R. Stora (Amsterdam: North-Holland, 1987), pp. 395–506.\t[Martinis et al., 1985] &ensp;J.M. Martinis, M.H. Devoret, &amp; J. Clarke, “Energy-level quantization in the zero-voltage state of a current-biased Josephson junction”, Physical Review Letters 55, 1543 (1985).\t[Martinis et al., 1987] &ensp;J.M. Martinis, M.H. Devoret, &amp; J. Clarke, “Experimental tests for the quantum behavior of a macroscopic degree of freedom: The phase difference across a Josephson junction”, Physical Review B 35, 4682 (1987).\t[Martinis et al., 2020] &ensp;J.M. Martinis, M.H. Devoret, &amp; J. Clarke, “Quantum Josephson junction circuits and the dawn of artificial atoms”, Nature Physics 16, 234 (2020).\t[Martinis, 2021] &ensp;J.M. Martinis, interview by D. Zierler, 4 May 2021, Oral History Interviews, Niels Bohr Library and Archives, American Institute of Physics.\t[Tinkham, 1996] &ensp;M. Tinkham, Introduction to Superconductivity, 2nd edition (New York: McGraw-Hill, 1996).本文作者为清华大学本科校友；2022 年于耶鲁大学应用物理系取得博士学位；现为加州大学圣巴巴拉分校物理系博士后研究员。 ",
